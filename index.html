<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>MESIN POLTAR & BBFS</title>
<style>
  body { font-family: Arial, sans-serif; background: #000; color: #fff; text-align: center; }
    .container { max-width: 800px; margin: 40px auto; background: rgba(255,255,255,0.2); padding: 20px; border-radius: 8px; }
    input { margin: 5px; padding: 5px; }
    #hasil {
      margin-top: 20px;
      white-space: pre-wrap;
      text-align: left;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 6px;
      max-height: 300px;
      overflow-y: auto; /* scroll vertikal */
    }
  .container {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 20px;
    gap: 20px;
    position: relative;
    z-index: 10;
  }
  .box {
    flex: 1;
    max-width: 48%;
    background: rgba(255,255,255,0.85);
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
    color: black;
  }
  h2 { text-align: center; color: #333; }

  #hasilPoltar, #hasilBbfs {
    max-height: 400px;
    overflow-y: auto;
    margin-top: 15px;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 10px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(5px);
    color: white;
  }

  table { width: 100%; border-collapse: collapse; }
  th, td {
    border: 1px solid rgba(255,255,255,0.5);
    padding: 6px;
    text-align: center;
    background: rgba(255,255,255,0.1);
    color: white;
  }
  th { background: rgba(76,175,80,0.6); color: #fff; }
  tr:nth-child(even) td { background: rgba(255,255,255,0.05); }
  .total { margin-top: 10px; font-weight: bold; color: yellow; }

  /* Meteor */
  .meteor {
    position: absolute;
    width: 4px;
    height: 80px;
    background: linear-gradient(to bottom, #fff, #ffcc00, transparent);
    border-radius: 50%;
    top: -100px;
    opacity: 0.8;
    animation: fall linear forwards;
  }
  .meteor::after {
    content: '';
    position: absolute;
    width: 6px;
    height: 100px;
    background: rgba(255, 100, 0, 0.6);
    filter: blur(5px);
    border-radius: 50%;
    top: 0;
    left: -1px;
  }
  @keyframes fall {
    0% { transform: translateY(-100px); opacity: 1; }
    70% { opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0; }
  }

  /* Bintang mouse */
  .star {
    position: absolute;
    width: 10px;
    height: 10px;
    background-color: yellow;
    border-radius: 50%;
    pointer-events: none;
    box-shadow: 0 0 10px yellow, 0 0 20px orange;
    animation: starFall 1s linear forwards;
  }
  @keyframes starFall {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(100px) scale(0); opacity: 0; }
  }
</style>
</head>
<body>
  <div class="container">
    <!-- POLTAR -->
    <div class="box">
      <h2>MESIN POLTAR</h2>
      <label>
        Angka Tarung Dalam:
        <input type="text" id="angkaPoltar" placeholder="Contoh: 125,456,850">
      </label>
      <input onclick="GeneratePoltar()" type="button" value="Generate">
      <input onclick="ClearPoltar()" type="button" value="Bersihkan">
      <div id="hasilPoltar">Hasil kombinasi akan muncul di sini...</div>
    </div>

    <!-- BBFS -->
    <div class="box">
      <h2>MESIN BBFS</h2>
      <label>Angka Tarung Dalam:</label>
      <input type="text" id="angkaBbfs" placeholder="Contoh: 123679"><br>
      <label>Set 4D,3D,2D : Ketik 4 / 3 / 2</label>
      <input type="text" id="setBbfs" placeholder="Contoh: 4"><br>
      <input type="button" value="Generate" onclick="GenerateBbfs()">
      <input type="button" value="Bersihkan" onclick="ClearBbfs()">
      <div id="hasilBbfs">Hasil kombinasi akan muncul di sini...</div>
      <button onclick="CopyBbfs()">Copy Hasil</button>
    </div>
  </div>

  <script>
  /* POLTAR */
  function GeneratePoltar() {
    const angkaInput = document.getElementById('angkaPoltar').value;
    const hasil = document.getElementById('hasilPoltar');
    const blokArr = angkaInput.split(',').map(a => a.trim()).filter(a => a);

    if (blokArr.length < 2) {
      hasil.innerHTML = "Minimal masukkan 2 blok angka, contoh: 125,456,850";
      return;
    }

    let output = [];
    function combineRecursive(bloks, pos = 0, prefix = "") {
      if (pos === bloks.length) {
        output.push(prefix);
        return;
      }
      for (let i = 0; i < bloks[pos].length; i++) {
        combineRecursive(bloks, pos + 1, prefix + bloks[pos][i]);
      }
    }
    combineRecursive(blokArr);
    output = [...new Set(output)];

    let tableHTML = `
      <strong>Input:</strong> ${angkaInput}<br>
      <strong>Kombinasi:</strong><br>
      <table>
        <tr><th>No</th><th>Kombinasi</th></tr>
    `;
    output.forEach((komb, idx) => {
      tableHTML += `<tr><td>${idx + 1}</td><td>${komb}</td></tr>`;
    });
    tableHTML += `</table><div class="total">Total Kombinasi: ${output.length}</div>`;
    hasil.innerHTML = tableHTML;
  }
  function ClearPoltar() {
    document.getElementById('angkaPoltar').value = '';
    document.getElementById('hasilPoltar').innerHTML = 'Hasil kombinasi akan muncul di sini...';
  }

  /* BBFS */
  function GenerateBbfs() {
    const angkaInput = document.getElementById('angkaBbfs').value.trim();
    const setInput = parseInt(document.getElementById('setBbfs').value.trim());
    const hasil = document.getElementById('hasilBbfs');

    if (!angkaInput || !setInput) {
      hasil.innerHTML = "Masukkan angka dan set (2,3,4)";
      return;
    }

    let digits = angkaInput.split('');
    let output = [];

    function permute(arr, k, prefix=[]) {
      if (prefix.length === k) {
        output.push(prefix.join(''));
        return;
      }
      for (let i=0; i<arr.length; i++) {
        if (!prefix.includes(arr[i])) {
          prefix.push(arr[i]);
          permute(arr, k, prefix);
          prefix.pop();
        }
      }
    }

    permute(digits, setInput);

    let formatted = output.join("*") + "*";
    hasil.innerHTML = `Input: ${angkaInput}<br>Set: ${setInput}D<br>Jumlah: ${output.length}<br><br>${formatted}`;
  }
  function ClearBbfs() {
    document.getElementById('angkaBbfs').value = '';
    document.getElementById('setBbfs').value = '';
    document.getElementById('hasilBbfs').innerHTML = 'Hasil kombinasi akan muncul di sini...';
  }
  function CopyBbfs() {
    const hasil = document.getElementById('hasilBbfs').innerText;
    navigator.clipboard.writeText(hasil).then(() => {
      alert("Hasil berhasil disalin ke clipboard!");
    });
  }

  /* Efek meteor */
  function createMeteor() {
    const meteor = document.createElement('div');
    meteor.classList.add('meteor');
    meteor.style.left = Math.random() * window.innerWidth + 'px';
    meteor.style.animationDuration = (Math.random() * 2 + 1) + 's';
    document.body.appendChild(meteor);
    setTimeout(() => meteor.remove(), 2000);
  }
  setInterval(createMeteor, 20); // tiap 0.5 detik

  /* Efek bintang mouse */
  document.addEventListener('mousemove', function(e) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = e.pageX + 'px';
    star.style.top = e.pageY + 'px';
    document.body.appendChild(star);
    setTimeout(() => { star.remove(); }, 3000);
  });
  </script>
